<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Spotify Clone</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#121212;
      color:white;
    }

    .navbar{
      background:black;
      padding:20px;
      font-size:28px;
      font-weight:bold;
      color:#1DB954;
    }

    .container{
      padding:30px;
    }

    h1{
      margin-bottom:20px;
    }

    .songs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:20px;
    }

    .card{
      background:#181818;
      padding:15px;
      border-radius:10px;
      transition:0.3s;
    }

    .card:hover{
      background:#282828;
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      border-radius:10px;
    }

    .song-name{
      margin-top:10px;
      font-weight:bold;
    }

    .artist{
      color:gray;
      font-size:14px;
      margin-top:5px;
    }

    .play{
      margin-top:10px;
      background:#1DB954;
      border:none;
      padding:10px 15px;
      border-radius:20px;
      cursor:pointer;
      font-weight:bold;
    }

    .player{
      position:fixed;
      bottom:0;
      width:100%;
      background:black;
      padding:15px;
      text-align:center;
    }

  </style>
</head>

<body>

  <div class="navbar">
    Spotify
  </div>

  <div class="container">

    <h1>Trending Songs</h1>

    <div class="songs">

      <div class="card">
        <img src="https://picsum.photos/300?1">
        <div class="song-name">Blinding Lights</div>
        <div class="artist">The Weeknd</div>
        <button class="play">Play</button>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300?2">
        <div class="song-name">Levitating</div>
        <div class="artist">Dua Lipa</div>
        <button class="play">Play</button>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300?3">
        <div class="song-name">Believer</div>
        <div class="artist">Imagine Dragons</div>
        <button class="play">Play</button>
      </div>

      <div class="card">
        <img src="https://picsum.photos/300?4">
        <div class="song-name">Starboy</div>
        <div class="artist">The Weeknd</div>
        <button class="play">Play</button>
      </div>

    </div>

  </div>

  <div class="player">
    🎵 Now Playing: Blinding Lights
  </div>

</body>
</html>
