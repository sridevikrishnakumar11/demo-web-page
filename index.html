<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spotify Clone</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --green:#1db954;
  --bg:#121212;
  --card:#181818;
  --hover:#282828;
  --sub:#b3b3b3;
}

body{
  display:grid;
  grid-template-columns:220px 1fr;
  grid-template-rows:1fr 80px;
  grid-template-areas:
  "side main"
  "player player";
  height:100vh;
  background:var(--bg);
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/* SIDEBAR */

.sidebar{
  grid-area:side;
  background:black;
  padding:20px 12px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:1.4rem;
  font-weight:bold;
  margin-bottom:30px;
}

.logo i{
  color:var(--green);
  font-size:2rem;
}

.nav a{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  color:var(--sub);
  padding:12px;
  border-radius:6px;
  margin-bottom:6px;
  transition:.2s;
}

.nav a:hover,
.nav a.active{
  background:var(--hover);
  color:white;
}

.playlist{
  margin-top:25px;
}

.playlist h3{
  margin-bottom:10px;
  color:#fff;
}

.playlist p{
  color:var(--sub);
  margin:10px 0;
  cursor:pointer;
}

/* MAIN */

.main{
  grid-area:main;
  overflow-y:auto;
  background:linear-gradient(180deg,#1a3a2a,var(--bg) 300px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 30px;
  position:sticky;
  top:0;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
}

.arrows button{
  background:black;
  border:none;
  color:white;
  width:32px;
  height:32px;
  border-radius:50%;
  margin-right:8px;
  cursor:pointer;
}

.user{
  background:black;
  padding:8px 14px;
  border-radius:20px;
  font-size:.9rem;
}

.banner{
  padding:40px 30px;
}

.banner small{
  letter-spacing:2px;
  font-weight:bold;
}

.banner h1{
  font-size:3rem;
  margin:10px 0;
}

.banner p{
  color:#ddd;
  margin-bottom:20px;
}

.banner button{
  background:var(--green);
  border:none;
  padding:12px 24px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
}

.section{
  padding:20px 30px 40px;
}

.section h2{
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:16px;
  border-radius:10px;
  transition:.2s;
  cursor:pointer;
  text-align:center;
}

.card:hover{
  background:var(--hover);
  transform:translateY(-4px);
}

.card img{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  border-radius:50%;
  margin-bottom:15px;
}

.card h3{
  margin-bottom:6px;
}

.card p{
  color:var(--sub);
  font-size:.85rem;
}

/* PLAYER */

.player{
  grid-area:player;
  background:#181818;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.song{
  display:flex;
  align-items:center;
  gap:12px;
}

.song img{
  width:55px;
  height:55px;
  object-fit:cover;
  border-radius:6px;
}

.controls{
  text-align:center;
}

.controls button{
  background:none;
  border:none;
  color:white;
  font-size:1rem;
  margin:0 10px;
  cursor:pointer;
}

.play-btn{
  background:white !important;
  color:black !important;
  width:35px;
  height:35px;
  border-radius:50%;
}

.progress{
  width:320px;
  height:4px;
  background:#555;
  margin-top:10px;
  border-radius:4px;
  overflow:hidden;
}

.progress div{
  width:40%;
  height:100%;
  background:white;
}

.volume{
  display:flex;
  align-items:center;
  gap:10px;
}

.volume-bar{
  width:100px;
  height:4px;
  background:#555;
  border-radius:4px;
  overflow:hidden;
}

.volume-bar div{
  width:70%;
  height:100%;
  background:white;
}
</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">
    <i class="fab fa-spotify"></i>
    Spotify
  </div>

  <div class="nav">
    <a href="#" class="active">
      <i class="fas fa-home"></i>
      Home
    </a>

    <a href="#">
      <i class="fas fa-search"></i>
      Search
    </a>

    <a href="#">
      <i class="fas fa-book"></i>
      Library
    </a>
  </div>

  <div class="playlist">
    <h3>Playlists</h3>

    <p>Ilaiyaraaja Classics</p>
    <p>AR Rahman Hits</p>
    <p>BTS Universe</p>
    <p>Anirudh Beats</p>
    <p>Liked Songs</p>
  </div>

</div>

<!-- MAIN -->

<div class="main">

  <div class="topbar">

    <div class="arrows">
      <button>
        <i class="fas fa-chevron-left"></i>
      </button>

      <button>
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>

    <div class="user">
      <i class="fas fa-user"></i>
      User
    </div>

  </div>

  <div class="banner">
    <small>ARTIST MIX</small>

    <h1>South & K-Pop Legends</h1>

    <p>
      Ilaiyaraaja · AR Rahman · BTS · Anirudh
    </p>

    <button>
      <i class="fas fa-play"></i>
      Play All
    </button>
  </div>

  <div class="section">

    <h2>Featured Artists</h2>

    <div class="grid" id="artists"></div>

  </div>

</div>

<!-- PLAYER -->

<div class="player">

  <div class="song">

    <img
    id="songImg"
    src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Ilaiyaraaja_at_Vikram_audio_launch.jpg">

    <div>
      <h4 id="songTitle">Ilaiyaraaja</h4>
      <p id="songArtist">Legendary Composer</p>
    </div>

  </div>

  <div class="controls">

    <div>
      <button>
        <i class="fas fa-random"></i>
      </button>

      <button>
        <i class="fas fa-step-backward"></i>
      </button>

      <button class="play-btn" id="playBtn">
        <i class="fas fa-play"></i>
      </button>

      <button>
        <i class="fas fa-step-forward"></i>
      </button>

      <button>
        <i class="fas fa-redo"></i>
      </button>
    </div>

    <div class="progress">
      <div></div>
    </div>

  </div>

  <div class="volume">

    <i class="fas fa-volume-up"></i>

    <div class="volume-bar">
      <div></div>
    </div>

  </div>

</div>

<script>

const artists = [

{
  name:"Ilaiyaraaja",
  desc:"Legendary Composer",
  img:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Ilaiyaraaja_at_Vikram_audio_launch.jpg"
},

{
  name:"AR Rahman",
  desc:"Oscar Winning Composer",
  img:"https://upload.wikimedia.org/wikipedia/commons/0/06/A._R._Rahman_in_2012.jpg"
},

{
  name:"BTS",
  desc:"K-Pop Global Icons",
  img:"https://upload.wikimedia.org/wikipedia/commons/0/0f/BTS_at_the_2019_Melon_Music_Awards_%28cropped%29.jpg"
},

{
  name:"Anirudh Ravichander",
  desc:"South Indian Music Star",
  img:"https://upload.wikimedia.org/wikipedia/commons/a/a6/Anirudh_Ravichander.jpg"
},

{
  name:"Sai Abhyankkar",
  desc:"Indie Soul Singer",
  img:"https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=800&auto=format&fit=crop"
}

];

const container = document.getElementById("artists");

artists.forEach(artist => {

  container.innerHTML += `

  <div class="card">

    <img src="${artist.img}" alt="${artist.name}">

    <h3>${artist.name}</h3>

    <p>${artist.desc}</p>

  </div>

  `;

});

const cards = document.querySelectorAll(".card");

cards.forEach((card,index)=>{

  card.addEventListener("click",()=>{

    document.getElementById("songImg").src =
    artists[index].img;

    document.getElementById("songTitle").innerText =
    artists[index].name;

    document.getElementById("songArtist").innerText =
    artists[index].desc;

  });

});

let playing = false;

document.getElementById("playBtn")
.addEventListener("click",function(){

  playing = !playing;

  this.innerHTML = playing
  ? '<i class="fas fa-pause"></i>'
  : '<i class="fas fa-play"></i>';

});

</script>

</body>
</html>
